# NOTE:
# - This is a template/reference file for /etc/nginx/sites-available/ittda-be.
# - Keep Certbot-managed blocks on server as-is.
# - Use include /etc/nginx/snippets/ittda-be-proxy.conf; for proxy rules.
# - Do not overwrite server site file via CI/CD automatically.

server {
    server_name ittda-be.o-r.kr;

    # Keep ACME challenge on local static files.
    # If this path is proxied to backend, HTTP-01 validation can fail.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    include /etc/nginx/snippets/ittda-be-proxy.conf;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ittda-be.o-r.kr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ittda-be.o-r.kr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = ittda-be.o-r.kr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name ittda-be.o-r.kr;
    return 404; # managed by Certbot
}
